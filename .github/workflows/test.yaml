name: "TEST"
# src/Personal/watch.js - 1x evening.yaml

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Select the task to run'
        type: choice
        required: true
        options:
          - test20
          - test22
          - test24

jobs:
  test20:
    if: |
      github.event.inputs.task == 'test20'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Script
        run: npx tsx src/Personal/test.js

  test22:
    if: |
      github.event.inputs.task == 'test22'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Script
        run: npx tsx src/Personal/test.js

  test24:
    if: |
      github.event.inputs.task == 'test24'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set Node Version
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run Script
        run: npx tsx src/Personal/test.js
